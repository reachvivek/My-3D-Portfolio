<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0d48a"/>
      <stop offset="50%" style="stop-color:#d4a853"/>
      <stop offset="100%" style="stop-color:#b8922e"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Subtle border ring -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.3"/>
  <!-- V letter -->
  <text x="256" y="310" text-anchor="middle" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="260" font-weight="700" fill="url(#gold)" letter-spacing="-10">V</text>
  <!-- Dot accent -->
  <circle cx="390" cy="160" r="16" fill="url(#gold)" opacity="0.8"/>
</svg>
